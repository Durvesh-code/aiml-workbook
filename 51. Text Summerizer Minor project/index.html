<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 20px;
            padding: 35px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #f97316;
            margin-bottom: 5px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        h3 {
            text-align: center;
            color: #6b7280;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 500;
            font-size: 1rem;
        }

        p.subtitle {
            text-align: center;
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        textarea {
            height: 160px;
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            resize: vertical;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #f9fafb;
        }

        textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
            background-color: #ffffff;
        }

        button {
            background-color: #f97316;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(249, 115, 22, 0.2);
        }

        button:hover {
            background-color: #ea580c;
            transform: translateY(-1px);
            box-shadow: 0 6px 10px rgba(249, 115, 22, 0.3);
        }

        button:disabled {
            background-color: #fdba74;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #summary-output {
            margin-top: 30px;
            background: #fff7ed;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #fed7aa;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        #summary-output.visible {
            display: block;
        }

        #summary-heading {
            margin: 0 0 10px 0;
            color: #9a3412;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
        }

        #summary-text {
            color: #431407;
            line-height: 1.6;
            margin: 0;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Summarizer</h1>
        <h3>using HuggingFace Transformer</h3>
        <p class="subtitle">Write or Paste your content below for quick summarization.</p>

        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your content here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>

        <div id="summary-output">
            <h3 id="summary-heading">Content Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        document.getElementById("summarization-form").addEventListener("submit", async (e) => {
            e.preventDefault();
        
            const dialogueInput = document.getElementById("dialogue-input");
            const summaryText = document.getElementById("summary-text");
            const submitButton = e.target.querySelector("button");
        
            const dialogue = dialogueInput.value.trim();
            if (!dialogue) return;
        
            summaryText.innerText = "Processing...";
            document.getElementById("summary-output").classList.add("visible");
            submitButton.disabled = true;
        
            try {
                const response = await fetch("/summarize/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dialogue }),
                });
        
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }
        
                const data = await response.json();
                summaryText.innerText = data.summary || "No summary returned.";
            } catch (err) {
                
                summaryText.innerText = `Error: ${err.message}`;
            } finally {
                
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
